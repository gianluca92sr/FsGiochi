<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Vending machine body -->
  <defs>
    <linearGradient id="machineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b9d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c44569;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a8e6ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#6dd5ed;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Main body -->
  <rect x="100" y="40" width="200" height="320" rx="15" fill="url(#machineGrad)" stroke="#8b3a62" stroke-width="3"/>
  
  <!-- Top cap -->
  <rect x="90" y="20" width="220" height="30" rx="10" fill="#ff3c78" stroke="#8b3a62" stroke-width="2"/>
  
  <!-- Glass window -->
  <rect x="120" y="70" width="160" height="180" rx="10" fill="url(#glassGrad)" stroke="#5ca3c7" stroke-width="2"/>
  
  <!-- Colorful balls inside -->
  <circle cx="150" cy="120" r="15" fill="#ffd93d" stroke="#f6c23e" stroke-width="2"/>
  <circle cx="185" cy="110" r="15" fill="#6bcf7f" stroke="#4caf50" stroke-width="2"/>
  <circle cx="220" cy="130" r="15" fill="#ff6b9d" stroke="#e91e63" stroke-width="2"/>
  <circle cx="165" cy="155" r="15" fill="#a29bfe" stroke="#6c5ce7" stroke-width="2"/>
  <circle cx="200" cy="165" r="15" fill="#fd79a8" stroke="#e84393" stroke-width="2"/>
  <circle cx="240" cy="145" r="15" fill="#ffeaa7" stroke="#fdcb6e" stroke-width="2"/>
  <circle cx="145" cy="190" r="15" fill="#74b9ff" stroke="#0984e3" stroke-width="2"/>
  <circle cx="180" cy="200" r="15" fill="#55efc4" stroke="#00b894" stroke-width="2"/>
  <circle cx="215" cy="210" r="15" fill="#fab1a0" stroke="#e17055" stroke-width="2"/>
  <circle cx="250" cy="180" r="15" fill="#dfe6e9" stroke="#b2bec3" stroke-width="2"/>
  
  <!-- Coin slot -->
  <rect x="170" y="270" width="60" height="8" rx="4" fill="#2d3436" stroke="#000" stroke-width="1"/>
  
  <!-- Prize outlet -->
  <rect x="140" y="300" width="120" height="40" rx="8" fill="#2d3436" stroke="#000" stroke-width="2"/>
  <rect x="150" y="310" width="100" height="20" rx="5" fill="#636e72"/>
  
  <!-- Decorative stripes -->
  <rect x="105" y="60" width="10" height="240" fill="#ff3c78" opacity="0.5"/>
  <rect x="285" y="60" width="10" height="240" fill="#ff3c78" opacity="0.5"/>
  
  <!-- Text label -->
  <text x="200" y="365" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2d3436" text-anchor="middle">PALLINE MAGICHE</text>
</svg>
