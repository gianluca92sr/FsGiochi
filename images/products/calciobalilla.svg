<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Table foosball -->
  <defs>
    <linearGradient id="tableGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00b894;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00796b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Table top -->
  <rect x="50" y="120" width="300" height="160" rx="10" fill="url(#tableGrad)" stroke="#004d40" stroke-width="3"/>
  
  <!-- Playing field -->
  <rect x="70" y="135" width="260" height="130" rx="5" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
  
  <!-- Center line -->
  <line x1="200" y1="135" x2="200" y2="265" stroke="#fff" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Center circle -->
  <circle cx="200" cy="200" r="25" fill="none" stroke="#fff" stroke-width="2"/>
  <circle cx="200" cy="200" r="3" fill="#fff"/>
  
  <!-- Goals -->
  <rect x="65" y="180" width="10" height="40" rx="3" fill="#e74c3c" stroke="#c0392b" stroke-width="1"/>
  <rect x="325" y="180" width="10" height="40" rx="3" fill="#3498db" stroke="#2980b9" stroke-width="1"/>
  
  <!-- Rods (horizontal bars) -->
  <rect x="35" y="155" width="330" height="4" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1"/>
  <rect x="35" y="185" width="330" height="4" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1"/>
  <rect x="35" y="210" width="330" height="4" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1"/>
  <rect x="35" y="245" width="330" height="4" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1"/>
  
  <!-- Handles -->
  <circle cx="35" cy="157" r="8" fill="#34495e"/>
  <circle cx="365" cy="157" r="8" fill="#34495e"/>
  <circle cx="35" cy="187" r="8" fill="#e74c3c"/>
  <circle cx="365" cy="187" r="8" fill="#e74c3c"/>
  <circle cx="35" cy="212" r="8" fill="#3498db"/>
  <circle cx="365" cy="212" r="8" fill="#3498db"/>
  <circle cx="35" cy="247" r="8" fill="#34495e"/>
  <circle cx="365" cy="247" r="8" fill="#34495e"/>
  
  <!-- Players (red team) -->
  <rect x="100" y="182" width="8" height="20" rx="4" fill="#e74c3c"/>
  <circle cx="104" cy="179" r="5" fill="#ffcdd2"/>
  <rect x="140" y="182" width="8" height="20" rx="4" fill="#e74c3c"/>
  <circle cx="144" cy="179" r="5" fill="#ffcdd2"/>
  
  <!-- Players (blue team) -->
  <rect x="250" y="207" width="8" height="20" rx="4" fill="#3498db"/>
  <circle cx="254" cy="204" r="5" fill="#bbdefb"/>
  <rect x="290" y="207" width="8" height="20" rx="4" fill="#3498db"/>
  <circle cx="294" cy="204" r="5" fill="#bbdefb"/>
  
  <!-- Ball -->
  <circle cx="180" cy="220" r="6" fill="#f39c12" stroke="#d68910" stroke-width="1"/>
  
  <!-- Legs -->
  <rect x="70" y="280" width="15" height="80" fill="#8b4513" stroke="#5d3020" stroke-width="2"/>
  <rect x="315" y="280" width="15" height="80" fill="#8b4513" stroke="#5d3020" stroke-width="2"/>
  
  <!-- Label -->
  <text x="200" y="385" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2d3436" text-anchor="middle">CALCIOBALILLA</text>
</svg>
