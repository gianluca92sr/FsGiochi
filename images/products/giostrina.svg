<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Kiddie ride - Horse -->
  <defs>
    <linearGradient id="horseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd93d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f6c23e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="baseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Base platform -->
  <ellipse cx="200" cy="330" rx="120" ry="30" fill="url(#baseGrad)" stroke="#a93226" stroke-width="2"/>
  <ellipse cx="200" cy="325" rx="115" ry="25" fill="#e74c3c"/>
  
  <!-- Spring/post -->
  <rect x="185" y="260" width="30" height="70" fill="#95a5a6" stroke="#7f8c8d" stroke-width="2"/>
  <path d="M 190 270 Q 195 265 200 270 T 210 270" fill="none" stroke="#ecf0f1" stroke-width="2"/>
  <path d="M 190 280 Q 195 275 200 280 T 210 280" fill="none" stroke="#ecf0f1" stroke-width="2"/>
  <path d="M 190 290 Q 195 285 200 290 T 210 290" fill="none" stroke="#ecf0f1" stroke-width="2"/>
  
  <!-- Saddle -->
  <ellipse cx="200" cy="250" rx="50" ry="15" fill="#8b4513" stroke="#5d3020" stroke-width="2"/>
  
  <!-- Horse body -->
  <ellipse cx="200" cy="200" rx="70" ry="50" fill="url(#horseGrad)" stroke="#d4a017" stroke-width="3"/>
  
  <!-- Horse neck and head -->
  <path d="M 270 190 Q 290 160 285 130 Q 283 110 270 105 Q 260 102 255 110 L 250 125 Q 248 135 250 145 L 255 160 Z" 
        fill="url(#horseGrad)" stroke="#d4a017" stroke-width="3"/>
  
  <!-- Horse ear -->
  <path d="M 265 112 L 270 95 L 273 110 Z" fill="#f6c23e" stroke="#d4a017" stroke-width="2"/>
  
  <!-- Horse eye -->
  <circle cx="268" cy="118" r="4" fill="#2d3436"/>
  <circle cx="269" cy="117" r="1.5" fill="#fff"/>
  
  <!-- Horse mane -->
  <path d="M 270 135 Q 275 130 278 135 M 270 145 Q 277 140 280 145 M 268 155 Q 275 150 278 155" 
        stroke="#e74c3c" stroke-width="3" stroke-linecap="round" fill="none"/>
  
  <!-- Reins/handles -->
  <path d="M 240 160 Q 235 155 230 160" stroke="#c0392b" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 240 170 Q 235 165 230 170" stroke="#c0392b" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Tail -->
  <path d="M 130 200 Q 100 195 90 210 Q 85 220 95 225" 
        stroke="#e74c3c" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M 90 210 Q 80 215 75 225" 
        stroke="#e74c3c" stroke-width="4" stroke-linecap="round" fill="none"/>
  
  <!-- Legs -->
  <rect x="165" y="240" width="12" height="35" rx="6" fill="#ffd93d" stroke="#d4a017" stroke-width="2"/>
  <rect x="215" y="240" width="12" height="35" rx="6" fill="#ffd93d" stroke="#d4a017" stroke-width="2"/>
  
  <!-- Hooves -->
  <rect x="163" y="270" width="16" height="10" rx="3" fill="#8b4513"/>
  <rect x="213" y="270" width="16" height="10" rx="3" fill="#8b4513"/>
  
  <!-- Decorative spots -->
  <ellipse cx="180" cy="190" rx="12" ry="8" fill="#f6c23e" opacity="0.6"/>
  <ellipse cx="220" cy="210" rx="10" ry="7" fill="#f6c23e" opacity="0.6"/>
  
  <!-- Coin slot indicator -->
  <rect x="185" y="315" width="30" height="6" rx="3" fill="#2d3436"/>
  
  <!-- Label -->
  <text x="200" y="385" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2d3436" text-anchor="middle">GIOSTRINA</text>
</svg>
